name: Build & Release Tauri App

# Trigger: Only on version tags (e.g., v1.0.0, v1.2.3)
on:
  push:
    tags:
      - 'v*'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write # Required for creating releases

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-14 # Apple Silicon runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Node.js dependencies
        working-directory: app
        run: npm ci

      - name: Bundle static FFmpeg binaries
        working-directory: app
        run: bash scripts/download-ffmpeg.sh

      # Builds the app and creates/updates the GitHub release with:
      # - DMG installer
      # - .app.tar.gz + .sig (updater artifacts)
      # - latest.json (updater manifest)
      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (key generated via `tauri signer generate`)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenSub ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
